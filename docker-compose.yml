version: '3.8'

services:
  # 1. Working Memory (Short-Term Context)
  hippocampus-redis:
    image: redis:alpine
    container_name: hippocampus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

  # 1.5. Visualizer (Redis Commander)
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: redis-ui
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:hippocampus-redis:6379
    depends_on:
      - hippocampus-redis

  # 2. Memory API & Dashboard Connector
  hippocampus-api:
    build: ./backend
    container_name: hippocampus-api
    working_dir: /app
    ports:
      - "8090:8000"
    volumes:
      - ./backend:/app  # Live mapping for development
    environment:
      - REDIS_HOST=hippocampus-redis
    depends_on:
      - hippocampus-redis

  # 3. Nexus Dashboard (Frontend) - DISABLED (Running native via start_dashboard.sh)
  # nexus-dashboard:
  #   image: node:20-alpine
  #   container_name: nexus-dashboard
  #   working_dir: /app
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./01_Areas/Codebases/ailcc/dashboard:/app
  #     - ./automations:/app/automations
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8090
  #   command: npm run dev
  #   depends_on:
  #     - hippocampus-api

  # 4. Valentine Core (Agent Orchestrator)
  valentine-core:
    build: ./agents/chatgpt-proxy
    container_name: valentine-core
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - REDIS_URL=redis://hippocampus-redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./agents/chatgpt-proxy:/app
    command: node server.js
    depends_on:
      - hippocampus-redis

volumes:
  redis_data:
