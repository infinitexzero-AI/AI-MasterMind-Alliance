services:
  n8n:
    image: n8nio/n8n:latest
    container_name: ailcc-n8n-orchestrator
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Halifax
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: ailcc-hippocampus-db
    ports:
      - "8123:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    # formatting:
    #   container_name: ailcc-n8n-orchestrator
