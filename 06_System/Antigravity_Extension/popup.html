<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 10px; font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 16px; margin-bottom: 10px; color: #38bdf8; }
    button { 
      width: 100%; 
      padding: 8px; 
      margin: 5px 0; 
      background: #1e293b; 
      border: 1px solid #334155; 
      color: #94a3b8; 
      cursor: pointer; 
      border-radius: 4px;
      transition: all 0.2s;
    }
    button:hover { background: #334155; color: #fff; }
    #status { font-size: 12px; color: #64748b; margin-top: 10px; font-family: monospace; }
    .active { color: #4ade80 !important; }
    .error { color: #f87171 !important; }
  </style>
</head>
<body>
  <h1>Antigravity Link</h1>
  <button id="pingBtn">📡 Ping System Bridge</button>
  <button id="statsBtn">📊 Get System Stats</button>
  <button id="studyBtn">📚 Activate Study Sanctum</button>
  <button id="automationBtn">🧪 Activate Automation Mode</button>
  <button id="contextBtn">📋 Copy System Context</button>
  <button id="dockerBtn">🐋 Launch Docker (AICC)</button>
  <div id="status">Ready.</div>
  <script src="popup.js"></script>
</body>
</html>
