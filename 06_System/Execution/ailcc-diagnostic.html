<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AILCC Diagnostics</title>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; border: 1px solid #334155; padding: 2rem; rounded: 1rem; background: #1e293b; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h1 { color: #818cf8; margin-bottom: 0.5rem; }
        .status { font-size: 1.25rem; margin: 1rem 0; }
        .blink { animation: blinker 1.5s linear infinite; color: #4ade80; }
        @keyframes blinker { 50% { opacity: 0; } }
        .links a { color: #38bdf8; text-decoration: none; margin: 0 1rem; border: 1px solid #38bdf8; padding: 0.5rem 1rem; border-radius: 0.25rem; transition: all 0.2s; }
        .links a:hover { background: #38bdf8; color: #0f172a; }
        .footer { margin-top: 2rem; font-size: 0.75rem; color: #64748b; }
    </style>
    <script>
        // Auto-refresh every 30 seconds
        setTimeout(() => window.location.reload(), 30000);
    </script>
</head>
<body>
    <div class="container">
        <h1>AILCC DIAGNOSTICS</h1>
        <div class="status">SYSTEM HEARTBEAT: <span class="blink">● ACTIVE</span></div>
        <p>Check Terminal for Real-time Logs</p>
        
        <div class="links">
            <a href="http://localhost:3000/antigravity" target="_blank" rel="noopener noreferrer">Launch Dashboard</a>
            <a href="http://localhost:3000/api/health" target="_blank" rel="noopener noreferrer">Check API Health</a>
        </div>

        <div class="footer">
            Updating every 30s<br>
            AILCC_PRIME // NODE_01
        </div>
    </div>
</body>
</html>
